server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend container
    location /extract_skills {
        proxy_pass http://backend:8001/extract_skills;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 10M;
    }

    location /suggest {
        proxy_pass http://backend:8001/suggest;
        proxy_set_header Host $host;
    }

    location /find_paths {
        proxy_pass http://backend:8001/find_paths;
        proxy_set_header Host $host;
    }

    location /job_titles {
        proxy_pass http://backend:8001/job_titles;
        proxy_set_header Host $host;
    }

    location /all_skills {
        proxy_pass http://backend:8001/all_skills;
        proxy_set_header Host $host;
    }

    location /analyze_target {
        proxy_pass http://backend:8001/analyze_target;
        proxy_set_header Host $host;
    }
}