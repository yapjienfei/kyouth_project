services:
  backend:
    build:
      context: .                 # project root – contains backend/, data/, pyproject.toml
      dockerfile: backend/Dockerfile
    container_name: career-backend
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data         # optional: persist data
      - ./backend:/app/backend   # optional: hot-reload (remove in prod)
    environment:
      - FLASK_ENV=development
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=postgresql://career:career@postgres:5432/career
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: career-worker
    command: celery -A backend.tasks worker --loglevel=info --concurrency=1
    volumes:
      - ./data:/app/data
      - ./backend:/app/backend
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=postgresql://career:career@postgres:5432/career
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: career-postgres
    environment:
      - POSTGRES_USER=career
      - POSTGRES_PASSWORD=career
      - POSTGRES_DB=career
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U career"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: career-redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: career-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
